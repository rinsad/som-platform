<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Shell Yellow background -->
  <rect width="48" height="48" rx="10" fill="#FFD500"/>

  <!-- Shell pecten body (red) — fan from apex (24,40) to scalloped top -->
  <path fill="#DD1D21" d="M24 40 L2 27 L4 17 L12 8 Q24 3 36 8 L44 17 L46 27 Z"/>

  <!-- Interior rib lines (yellow) dividing shell into sections -->
  <line x1="24" y1="40" x2="4"  y2="17" stroke="#FFD500" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="40" x2="12" y2="8"  stroke="#FFD500" stroke-width="2"   stroke-linecap="round"/>
  <line x1="24" y1="40" x2="24" y2="4"  stroke="#FFD500" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="24" y1="40" x2="36" y2="8"  stroke="#FFD500" stroke-width="2"   stroke-linecap="round"/>
  <line x1="24" y1="40" x2="44" y2="17" stroke="#FFD500" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Base arc (shell hinge/foot) -->
  <path d="M16 42 Q24 47 32 42" fill="#DD1D21"/>
</svg>
